body:
  text: 天台大師出夫人修禪學慧法門先明方便後明正觀方便者凡有五種初具五緣一者衣食具足二者持戒清淨三者間居靜處四者息諸緣務五者親近善知識五緣若闕則妨安心若無善知識則不知遮障為此義故須具五緣也二呵五欲者謂色聲香味觸也此五種能生行人欲樂之心貪愛無足若不呵却則妨正業故須呵却三棄五蓋此五蓋者一貪欲蓋二嗔恚蓋三睡眠蓋四掉悔蓋五疑蓋此五若棄捨心則得安也此五在心則纏覆不明四調五事者一調食不飢不飽二調眼令不節不恣此二就定外調之三調身四調息五調心此三就定內調之調身者令不寬不急是調身相次調息者令息出入綿靜細如有如無資神安禪守之心易得定舉要言之不澀不滑是調息相次調心者若多覺觀浮動須繫念在齊中制諸亂想若心沈惛頭低睡熟無記者當繫鼻端令心在緣無分散意舉要言之不沈不浮是調心相次復正於坐中若覺身息心三事不調者即須用前法調之三事若調禪定可獲次欲出定時應前放心異緣次開口放氣想從百脈隨意有散次微微動身次動肩脾手頭頸等次動兩足膝等次以手遍摩諸毛孔次按兩掌令𤏙掩兩眼然後開眼待身汗燥方可隨意若不爾者令人作病第五行五法者謂欲精進念巧慧一心是也釋云欲者欲離世間一切妄想顛倒欲得一切禪定智慧諸法門也精進者持戒清淨初中後夜專精進修習無上道法念者念世間法治生産業一色一香無非佛法也巧慧者思惟世間陰界入等一一皆入如實令魔界即佛界為佛事如薩陀波倫也一心者既知世法即是出世法應當專修定慧二法令與法性相應心如金剛無能壞者故名一心也此上並是坐禪約出入略示此法夫欲發心學道先須問路路有通塞法有是非心有邪正今且約坐禪示其相餘則可解塞路者苦集為塞道滅為通無明十二因緣為塞無明滅為通六蔽為塞六度為通若有三塞破之令通也次簡邪正者一若為利養破戒等事發心學禪者此發泥梨心行地獄道二若求名聞望他稱譽而學禪者是發諂曲心行鬼道三若為眷屬徒衆多檀越等是發飛走心行畜生道四若為勝他妬忌者是發醜陋心行修羅道五若為此生謝後恐失未來人身兼持戒而發心學禪者是發欲界下心行人道六若為求今世後世自然果報兼修十善是發欲界上心行天道七若為捍伏於他復層自舉狼踞唐視令物歸仰者是發魔羅心行第六天道八若為求今世後世禪定靜樂者是發梵心行色天道九若為求世智辨聰無事不知者為此學禪者是發外道心行無想行天道十若為思惟世間生死窂獄甚可猒患出世涅槃清淨寂滅甚可欣樂為此發心欲速出三界者是發無漏心行二乘道非心無量略示十種非心耳前九是世間心是生死心後一是出世心是涅槃心是聖人心是解脫心行者汝學修道應善識邪正莫浪發心二乘出世間尚簡是非況前諸心妄謂為是若欲與理相應者但首作人事莫強知他事即是更相憎恨世世相憎非但此生無道無果纍及後生能閇口合掌塞耳端坐修心者是出世聖人若不爾者餓鬼畜生之道難得免離也次明修止觀者先約坐中修者行人於坐中為亂想覺觀修三止一名繫緣止止者謂繫心鼻端隔齊間等處繫緣守境令念心不散二名制心止止者隨心不起即須制之不馳散也此二是事止耳三體真止止者隨心所念一切諸法即須體之知悉從緣生從緣生之法無有自性既知無性即不取著以不取故妄念心息是名為止止心不動名為無為無為者即諸法本源若能安本源則一切妄想生死業行即皆空寂即泥洹道真法實也略明三止竟次作觀者謂正觀中道諸法實相智慧也行者於坐禪中隨心所緣一切諸法若善法若惡法若無記法等隨所緣念念不住雖如上體真而不止者即當反觀所起之心從何處生從過去生耶現耶未來耶若從過去生者過去已滅云何能生若從現在生者現在念念不住云何能生若從未來生者未來未至云何能生三世求生畢竟不可得當知此心但有名字名字之法本自無生無生故無滅故無滅即是中道第一義諦觀也又撿此心為有為無若心無者云何有念心若是有者應當自有何須緣發始有心生當知此心非有非無即是中道正觀也復次於禪中沈惛睡熟頭低無記者即須修觀分別法相對治沈病若於坐禪中心散動越逸攀緣萬境即須用止除亂想一心念之若修止時心安快樂即應修止又修止時能破睡散即應修止又修止時豁豁欲想清淨即應修止又修觀時心地靜樂即宜修觀又修觀時道心起即宜修觀又修觀時能破煩惱惡見即宜修觀觀若有益即常修觀止若有益即常修止行者善須斟酌巧用止觀調心令妄念不起即是善能用心有少道理也次明歷緣對境修止觀者歷緣有六謂行住坐臥言語作務也對境亦有六謂六根對六塵也緣與境合有十二事初就行中修止觀者行者欲行之時即應思惟我今為何事故行若為惡事無益等事即不應行若為善事利益等事即應行行中修止觀者即應知因於行故則有一切善惡等法今推此行及諸法悉是虗妄求實叵得妄念不起是名為止復作是念由心運身故有去來及行中一切法令及觀此行中之心不見相貌來處去處無生無滅當知行者及一切法畢竟空寂是名為觀於行緣中修止觀既然餘五緣例爾次對境修止觀者見色之時即知如幻如化不起貪染心安寂然是名為止當及觀見色之心從何而生為從眼根生為從色塵生為根塵合生為離根塵生若見色從眼生者未見色時心應已生若從色塵生者何關我耶若從合生者撿此根塵為各有心為各無心若有心能生心者合時應有兩心若各無心能生心者無有是處若離根塵有心生亦無有是處當知見色之心本自無生但有名字名字性空畢竟無實是名為觀於眼見色時修止觀既然餘五根對五塵例爾次於禮佛中修一心三觀者觀一念禮佛之心即空即假即中觀心即空是禮報佛觀心即假是禮應佛觀心即中是禮法佛一禮即三禮一佛即三佛雖三而一即一而三是名圓禮亦名不思議禮佛又誦經旋繞歷緣對境與心動念皆例如此用三觀也問一心三觀有何功用答即空觀破四住惑即假觀破塵沙惑即中觀破無明惑一心三觀三諦圓破五住五住煩惱破即三身顯四住破即報身顯塵沙破即應身顯無明破即法身顯又三觀成故即三德滿中觀成即法身滿假觀成般若滿空觀成即解脫滿三德滿故名祕密藏佛及衆生悉入其中畢竟無所有永寂如虗空若然者云何復言有一切法佛以假名字引導諸衆生復次泥洹真法實衆生從種種門入令粗依一理略出此法示初心行人不可執此為是餘者為非若得此意者則千車同轍萬流咸會也一切諸法體性平等衆生身內法身佛盡虗空遍法界一切行人常斂念觀四大五陰空無所有名為道
